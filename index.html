    <script>
      // Fix for iframe environments where window.fetch is a read-only getter and crashes on polyfill/setup attempts
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(val) { customFetch = val; },
            configurable: true,
            enumerable: true
          });
          if (typeof global === 'undefined') {
            window.global = window;
          }
        } catch (e) {
          console.warn('Could not polyfill window.fetch setter:', e);
        }
      })();
    </script>
